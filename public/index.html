<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>QueueStorm — Agent Triage</title>
    <meta name="description" content="Investigate fintech support tickets with evidence-based rule reasoning." />
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="/style.css" />
  </head>
  <body class="bg-slate-950 text-slate-100 min-h-screen antialiased">
    <!-- Header -->
    <header class="border-b border-slate-800/80 backdrop-blur sticky top-0 z-10 bg-slate-950/70">
      <div class="max-w-7xl mx-auto px-6 py-4 flex items-center justify-between">
        <div class="flex items-center gap-3">
          <span class="text-2xl">⚡</span>
          <div>
            <h1 class="text-lg font-semibold tracking-tight">QueueStorm Investigator</h1>
            <p class="text-xs text-slate-400 -mt-0.5">Evidence-based fintech support triage</p>
          </div>
        </div>
        <div class="flex items-center gap-3">
          <span id="envBadge" class="hidden md:inline text-[10px] uppercase tracking-wider px-2 py-1 rounded bg-slate-800 text-slate-400">
            SUST Preli · 2026
          </span>
          <span id="healthPill" class="text-xs px-3 py-1 rounded-full bg-slate-800 text-slate-300 flex items-center gap-2">
            <span class="inline-block w-2 h-2 rounded-full bg-slate-500"></span>
            <span id="healthLabel">checking…</span>
          </span>
        </div>
      </div>
    </header>

    <!-- Main -->
    <main class="max-w-7xl mx-auto px-6 py-8 grid lg:grid-cols-2 gap-6">
      <!-- LEFT — Inputs -->
      <section class="bg-slate-900/60 border border-slate-800 rounded-2xl p-6 space-y-5">
        <div>
          <h2 class="text-sm font-semibold text-slate-300 uppercase tracking-wider mb-3">Ticket</h2>
          <div class="space-y-3">
            <div>
              <label for="ticketId" class="block text-xs text-slate-400 mb-1">Ticket ID</label>
              <input id="ticketId" type="text" placeholder="T-001"
                class="w-full bg-slate-800/80 border border-slate-700 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-emerald-500/40 focus:border-emerald-500/60 transition" />
            </div>
            <div>
              <label for="complaint" class="block text-xs text-slate-400 mb-1">Customer complaint (English / Bangla / Banglish)</label>
              <textarea id="complaint" rows="4" placeholder="e.g. I paid 5000 BDT to ABC Store yesterday but payment failed."
                class="w-full bg-slate-800/80 border border-slate-700 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-emerald-500/40 focus:border-emerald-500/60 transition resize-y"></textarea>
              <p id="complaintError" class="text-xs text-rose-400 mt-1 hidden"></p>
            </div>
          </div>
        </div>

        <div>
          <div class="flex items-center justify-between mb-3">
            <h2 class="text-sm font-semibold text-slate-300 uppercase tracking-wider">Transactions</h2>
            <button id="addTx" type="button"
              class="text-xs bg-slate-800 hover:bg-slate-700 border border-slate-700 px-3 py-1.5 rounded-lg transition">
              + Add row
            </button>
          </div>
          <div id="txList" class="space-y-2"></div>
          <p id="txError" class="text-xs text-rose-400 mt-2 hidden"></p>
        </div>

        <div class="flex flex-wrap items-center gap-3 pt-2">
          <button id="analyze" type="button"
            class="bg-emerald-500 hover:bg-emerald-400 disabled:bg-slate-700 disabled:text-slate-400 text-slate-950 font-semibold px-5 py-2.5 rounded-lg transition shadow-lg shadow-emerald-500/10 disabled:shadow-none flex items-center gap-2">
            <span id="analyzeLabel">Analyze ▶</span>
            <svg id="analyzeSpinner" class="hidden w-4 h-4 animate-spin" viewBox="0 0 24 24" fill="none">
              <circle cx="12" cy="12" r="10" stroke="currentColor" stroke-width="3" stroke-opacity="0.25" />
              <path d="M22 12a10 10 0 0 1-10 10" stroke="currentColor" stroke-width="3" stroke-linecap="round" />
            </svg>
          </button>
          <button id="loadSample" type="button"
            class="bg-slate-800 hover:bg-slate-700 border border-slate-700 px-4 py-2.5 rounded-lg text-sm transition">
            Load sample
          </button>
          <button id="clearAll" type="button"
            class="text-slate-400 hover:text-slate-200 text-sm px-3 py-2.5 transition">
            Clear
          </button>
        </div>
      </section>

      <!-- RIGHT — Output -->
      <section id="outputPanel" class="bg-slate-900/60 border border-slate-800 rounded-2xl p-6 min-h-[480px] flex flex-col">
        <div id="outputEmpty" class="flex-1 flex flex-col items-center justify-center text-center text-slate-500">
          <div class="text-5xl mb-3 opacity-60">🧾</div>
          <p class="text-sm">Run an analysis to see the verdict.</p>
          <p class="text-xs text-slate-600 mt-1">All fields from the official response schema will appear here.</p>
        </div>
        <div id="outputContent" class="hidden space-y-4"></div>
      </section>
    </main>

    <!-- Footer -->
    <footer class="max-w-7xl mx-auto px-6 py-8 text-xs text-slate-500 flex flex-wrap items-center justify-between gap-2 border-t border-slate-800/60 mt-8">
      <span>Backend: <code id="backendUrl" class="text-slate-400"></code></span>
      <span>Deterministic · rule-based · safe by construction</span>
    </footer>

    <script src="/app.js"></script>
  </body>
</html>
